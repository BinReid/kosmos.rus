{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>
        <i class="fas fa-compass text-danger me-2"></i>
        Управление направлениями карьеры
    </h2>
    <a href="{{ url_for('admin.admin_direction_add') }}" class="btn btn-cosmos">
        <i class="fas fa-plus me-2"></i>Добавить направление
    </a>
</div>

<div class="cosmos-card p-4">
    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Иконка</th>
                    <th>Название</th>
                    <th>Порядок</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for direction in directions %}
                <tr>
                    <td>{{ direction.id }}</td>
                    <td><span class="fs-3">{{ direction.icon }}</span></td>
                    <td>{{ direction.title }}</td>
                    <td>{{ direction.sort_order }}</td>
                    <td>
                        <a href="{{ url_for('admin.admin_direction_edit', direction_id=direction.id) }}" class="btn btn-sm btn-warning">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a href="{{ url_for('admin.admin_direction_delete', direction_id=direction.id) }}" class="btn btn-sm btn-danger" 
                           onclick="return confirm('Удалить направление?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
