{% extends "base.html" %}

{% block content %}
<div class="container">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>
        <i class="fas fa-university text-danger me-2"></i>
        Управление ВУЗами
    </h2>
    <a href="{{ url_for('admin.admin_university_add') }}" class="btn btn-cosmos">
        <i class="fas fa-plus me-2"></i>Добавить ВУЗ
    </a>
</div>

<div class="cosmos-card p-4">
    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Город</th>
                    <th>Сайт</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for uni in universities %}
                <tr>
                    <td>{{ uni.id }}</td>
                    <td>{{ uni.name }}</td>
                    <td>{{ uni.city }}</td>
                    <td>{% if uni.website %}<a href="{{ uni.website }}" target="_blank" class="text-danger">{{ uni.website[:30] }}</a>{% endif %}</td>
                    <td>
                        <a href="{{ url_for('admin.admin_university_edit', university_id=uni.id) }}" class="btn btn-sm btn-warning">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a href="{{ url_for('admin.admin_university_delete', university_id=uni.id) }}" class="btn btn-sm btn-danger" 
                           onclick="return confirm('Удалить ВУЗ? Все данные будут потеряны!')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</div>
{% endblock %}
