{% extends "base.html" %}

{% block content %}
<div class="container">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-newspaper text-danger me-2"></i>Управление новостями</h2>
    <a href="{{ url_for('admin.news_add') }}" class="btn btn-cosmos">
        <i class="fas fa-plus me-2"></i>Добавить новость
    </a>
</div>

<div class="cosmos-card p-4">
    <div class="table-responsive">
        <table class="table table-dark table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Заголовок</th>
                    <th>Дата</th>
                    <th>Просмотры</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for item in news %}
                <tr>
                    <td>{{ item.id }}</td>
                    <td>{{ item.title }}</td>
                    <td>{{ item.created_at.strftime('%d.%m.%Y') }}</td>
                    <td>{{ item.views }}</td>
                    <td>
                        <a href="{{ url_for('admin.news_edit', news_id=item.id) }}" class="btn btn-sm btn-warning">
                            <i class="fas fa-edit"></i>
                        </a>
                        <a href="{{ url_for('admin.news_delete', news_id=item.id) }}" class="btn btn-sm btn-danger" 
                           onclick="return confirm('Удалить новость?')">
                            <i class="fas fa-trash"></i>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</div>
{% endblock %}
