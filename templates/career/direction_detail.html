{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="cosmos-card p-4">
            <div class="text-center mb-4">
                <div class="direction-icon" style="font-size: 4rem;">{{ direction.icon | safe }}</div>
                <h2 class="mt-2">{{ direction.title }}</h2>
                <p class="lead">{{ direction.description }}</p>
            </div>
            
            <hr class="border-secondary">
            
            <div class="direction-content rich-content">
                {{ direction.content|safe }}
            </div>
            
            <div class="text-center mt-4 pt-3 border-top border-secondary">
                <a href="{{ url_for('career.index') }}" class="btn btn-outline-cosmos">
                    <i class="fas fa-arrow-left me-2"></i>Вернуться к направлениям
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
